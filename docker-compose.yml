services:
  app:
    build: .
    image: wolle-economy-viewer:latest
    container_name: wolle-economy-viewer
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
